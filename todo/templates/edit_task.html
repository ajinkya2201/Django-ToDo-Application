{% extends "todo/base.html" %}

{% block title %}
Edit Task
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="card shadow">

            <div class="card-header bg-warning">

                <h3>Edit Task</h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit"
                            class="btn btn-warning">

                        Update Task

                    </button>

                    <a href="{% url 'home' %}"
                       class="btn btn-secondary">

                        Cancel

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
